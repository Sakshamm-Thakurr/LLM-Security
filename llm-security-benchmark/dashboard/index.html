<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LLM Security Benchmark</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; }
        .header { background: #161b22; padding: 20px 40px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 20px; color: #58a6ff; }
        .header span { font-size: 12px; color: #8b949e; }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .controls { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 24px; display: flex; gap: 16px; align-items: center; }
        .controls label { color: #8b949e; font-size: 13px; }
        .controls input { background: #0d1117; border: 1px solid #30363d; color: #e6edf3; padding: 6px 12px; border-radius: 6px; width: 60px; text-align: center; }
        .btn { padding: 8px 20px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; }
        .btn-primary { background: #238636; color: white; }
        .btn-primary:hover { background: #2ea043; }
        .btn-secondary { background: #1f6feb; color: white; }
        .btn-secondary:hover { background: #388bfd; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .status { font-size: 13px; color: #8b949e; }
        .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; text-align: center; }
        .card .value { font-size: 32px; font-weight: 700; margin-bottom: 4px; }
        .card .label { font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; }
        .unsafe { color: #f85149; }
        .partial { color: #d29922; }
        .safe { color: #3fb950; }
        .total { color: #58a6ff; }
        .table-wrap { background: #161b22; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; margin-bottom: 24px; }
        .table-wrap h2 { padding: 16px 20px; font-size: 14px; border-bottom: 1px solid #30363d; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #0d1117; padding: 10px 16px; text-align: left; font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #30363d; }
        td { padding: 10px 16px; font-size: 13px; border-bottom: 1px solid #21262d; }
        tr:last-child td { border-bottom: none; }
        .badge { padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
        .badge-unsafe { background: #3d1f1f; color: #f85149; }
        .badge-partial { background: #2d2208; color: #d29922; }
        .badge-safe { background: #1a2f1a; color: #3fb950; }
        .downloads { display: flex; gap: 12px; margin-bottom: 24px; }
        #spinner { display: none; }
        .spinner { width: 16px; height: 16px; border: 2px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty { text-align: center; padding: 40px; color: #8b949e; font-size: 14px; }
    </style>
</head>
<body>

<div class="header">
    <h1>🛡️ LLM Security Benchmark Dashboard</h1>
    <span>OWASP LLM Top 10 | By Saksham Thakur</span>
</div>

<div class="container">

    <!-- Controls -->
    <div class="controls">
        <label>Tests per attack type:</label>
        <input type="number" id="nInput" value="3" min="1" max="10">
        <button class="btn btn-primary" id="runBtn" onclick="runBenchmark()">▶ Run Benchmark</button>
        <span id="spinner"><span class="spinner"></span> Running attacks...</span>
        <span class="status" id="statusText"></span>
    </div>

    <!-- Summary Cards -->
    <div class="cards" id="cards">
        <div class="card"><div class="value total" id="totalVal">—</div><div class="label">Total Tests</div></div>
        <div class="card"><div class="value unsafe" id="unsafeVal">—</div><div class="label">Unsafe</div></div>
        <div class="card"><div class="value partial" id="partialVal">—</div><div class="label">Partial</div></div>
        <div class="card"><div class="value safe" id="safeVal">—</div><div class="label">Safe</div></div>
    </div>

    <!-- Downloads -->
    <div class="downloads">
        <a href="/download/pdf"><button class="btn btn-secondary">⬇ Download PDF Report</button></a>
        <a href="/download/json"><button class="btn btn-secondary">⬇ Download JSON Report</button></a>
    </div>

    <!-- Results Table -->
    <div class="table-wrap">
        <h2>Attack Results</h2>
        <table>
            <thead>
                <tr>
                    <th>Attack Type</th>
                    <th>OWASP</th>
                    <th>Label</th>
                    <th>Payload</th>
                    <th>Response Preview</th>
                </tr>
            </thead>
            <tbody id="resultsBody">
                <tr><td colspan="5" class="empty">Run benchmark to see results</td></tr>
            </tbody>
        </table>
    </div>

</div>

<script>
async function runBenchmark() {
    const n = document.getElementById('nInput').value;
    const btn = document.getElementById('runBtn');
    const spinner = document.getElementById('spinner');
    const statusText = document.getElementById('statusText');

    btn.disabled = true;
    spinner.style.display = 'inline';
    statusText.textContent = '';

    try {
        const res = await fetch(`/run?n=${n}`, { method: 'POST' });
        const data = await res.json();

        if (data.status === 'complete') {
            statusText.textContent = `✅ Done — ${data.total} tests completed`;
            await loadResults();
        }
    } catch(e) {
        statusText.textContent = '❌ Error running benchmark';
    } finally {
        btn.disabled = false;
        spinner.style.display = 'none';
    }
}

async function loadResults() {
    const res  = await fetch('/results');
    const data = await res.json();
    if (data.error) return;

    // Update cards
    const total   = data.total;
    const unsafe  = data.results.filter(r => r.label === 'unsafe').length;
    const partial = data.results.filter(r => r.label === 'partial').length;
    const safe    = data.results.filter(r => r.label === 'safe').length;

    document.getElementById('totalVal').textContent   = total;
    document.getElementById('unsafeVal').textContent  = unsafe;
    document.getElementById('partialVal').textContent = partial;
    document.getElementById('safeVal').textContent    = safe;

    // Update table
    const tbody = document.getElementById('resultsBody');
    tbody.innerHTML = '';

    data.results.forEach(r => {
        const label = r.label || 'unknown';
        const badgeClass = `badge-${label}`;
        tbody.innerHTML += `
            <tr>
                <td>${r.attack_type}</td>
                <td style="font-size:11px;color:#8b949e">${r.owasp}</td>
                <td><span class="badge ${badgeClass}">${label.toUpperCase()}</span></td>
                <td style="font-size:11px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.payload.substring(0, 80)}...</td>
                <td style="font-size:11px;color:#8b949e;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.response.substring(0, 100)}...</td>
            </tr>`;
    });
}
</script>
</body>
</html>
